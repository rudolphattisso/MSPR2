# Listener MQTT standard
listener 1883
allow_anonymous true

# Listener WebSockets (utile pour debug navigateur)
listener 9001
protocol websockets
allow_anonymous true

# Persistance
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
