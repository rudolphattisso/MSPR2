services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: futurekawa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-futurekawa}
      POSTGRES_USER: ${POSTGRES_USER:-futurekawa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-futurekawa_secret}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-futurekawa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: futurekawa-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # Boîte mail de test (capture tous les emails en local, aucun envoi réel).
  # SMTP : 1025  ·  Interface web : http://localhost:8025
  # Pour de vrais envois, basculer les variables SMTP_* vers Gmail/Resend.
  mailhog:
    image: mailhog/mailhog
    container_name: futurekawa-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db_data:
  mosquitto_data:
  mosquitto_log:
